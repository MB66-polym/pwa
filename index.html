<!DOCTYPE html>
<html lang="ja" data-scheme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOUBLES MAKER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ========== DESIGN TOKENS ========== */
:root {
  --bg: #1a1f2e; --surface: #242b3d; --surface2: #2e3852;
  --accent-a: #00e5c8; --accent-b: #7b68ee;
  --text: #e8eeff; --text-dim: #8896b3;
  --radius: 12px; --on-accent: #0a0e1a;
  --footer-color: rgba(255,255,255,0.25);
}
:root[data-scheme="white"] {
  --bg: #f4f6ff; --surface: #ffffff; --surface2: #e8edf7;
  --text: #1a1f2e; --text-dim: #3a4870;
  --accent-a: #0095a8; --accent-b: #6355cc;
  --on-accent: #ffffff; --footer-color: rgba(20,30,80,0.4);
}
:root[data-scheme="bw"] {
  --bg: #ffffff; --surface: #f2f2f2; --surface2: #e2e2e2;
  --text: #0a0a0a; --text-dim: #555555;
  --accent-a: #0a0a0a; --accent-b: #555555;
  --on-accent: #ffffff; --footer-color: rgba(0,0,0,0.35);
}
:root[data-scheme="neon"] {
  --bg: #05050e; --surface: #0c0c1e; --surface2: #141430;
  --text: #e0e0ff; --text-dim: #7070bb;
  --accent-a: #ff2d78; --accent-b: #00f0ff;
  --on-accent: #000000; --footer-color: rgba(200,200,255,0.3);
}
:root[data-scheme="neon"] .top-bar { border-bottom: 1px solid rgba(0,240,255,0.18); }
:root[data-scheme="neon"] .icon-btn { border: 1px solid rgba(0,240,255,0.2); }
:root[data-scheme="neon"] .setup-card { border: 1px solid rgba(0,240,255,0.12); }
:root[data-scheme="neon"] .pill.sel-a { box-shadow: 0 0 10px rgba(255,45,120,0.5); }
:root[data-scheme="neon"] .start-btn { box-shadow: 0 0 24px rgba(255,45,120,0.5); }
:root[data-scheme="neon"] .nav-btn-next { box-shadow: 0 0 16px rgba(255,45,120,0.35); }
:root[data-scheme="neon"] .court-card-header { border-bottom: 1px solid rgba(0,240,255,0.15); }
:root[data-scheme="neon"] .team-badge.b { color: #000; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ========== TOP BAR ========== */
.top-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid rgba(128,128,255,0.08);
  position: sticky; top: 0; z-index: 100;
}
.top-bar-round {
  font-family: 'Bebas Neue', cursive;
  font-size: 22px; letter-spacing: 4px; flex: 1;
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 16px; transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:active { transform: scale(0.9); }

/* ========== SETUP SCREEN ========== */
#setup-screen {
  max-width: 480px; margin: 0 auto;
  padding: 24px 14px 40px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.setup-logo {
  font-family: 'Bebas Neue', cursive; font-size: 30px; letter-spacing: 5px;
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-align: center; line-height: 1.25; margin-bottom: 4px;
}
.setup-card {
  width: 100%; background: var(--surface);
  border-radius: var(--radius); padding: 14px 16px;
}
.setup-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px;
}
.pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
.pill {
  padding: 8px 16px; border-radius: 20px;
  background: var(--surface2); border: none; cursor: pointer;
  color: var(--text-dim); font-size: 13px; font-weight: 700;
  transition: all 0.15s; user-select: none;
}
.pill.sel-a { background: var(--accent-a); color: var(--on-accent); }
.pill:active { transform: scale(0.95); }

/* Stepper */
.stepper {
  display: flex; align-items: center; gap: 0;
  background: var(--surface2); border-radius: 10px; overflow: hidden;
  align-self: flex-start;
}
.stepper-btn {
  width: 44px; height: 44px; border: none; cursor: pointer;
  background: none; color: var(--text); font-size: 22px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; flex-shrink: 0;
}
.stepper-btn:active { background: rgba(128,128,255,0.1); transform: scale(0.9); }
.stepper-val {
  font-family: 'Bebas Neue', cursive; font-size: 32px;
  color: var(--accent-a); min-width: 56px; text-align: center; line-height: 44px;
}

/* Name grid */
.name-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  max-height: 300px; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
  width: 100%;
}
.name-item {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border-radius: 8px; padding: 5px 10px;
  min-width: 0;
}
.name-num {
  font-family: 'Bebas Neue', cursive; font-size: 17px;
  color: var(--accent-a); min-width: 20px; text-align: center; flex-shrink: 0;
}
.name-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
  min-width: 0; width: 0;
}
.name-input::placeholder { color: var(--text-dim); }

.start-btn {
  width: 100%; max-width: 420px;
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  border: none; border-radius: var(--radius);
  color: var(--on-accent); font-family: 'Bebas Neue', cursive;
  font-size: 20px; letter-spacing: 4px; padding: 16px;
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 0 20px rgba(0,229,200,0.22);
  transition: all 0.15s;
}
.start-btn:active { transform: scale(0.98); }

/* ========== GAME SCREEN ========== */
#game-screen {
  display: flex; flex-direction: column;
  height: calc(100dvh - 57px);
}
.game-body {
  flex: 1; overflow-y: auto; padding: 10px 12px 6px;
  display: flex; flex-direction: column; gap: 8px;
  max-width: 600px; margin: 0 auto; width: 100%;
  scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
}

/* Round header */
.round-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 2px 2px 0;
}
.round-label {
  font-family: 'Bebas Neue', cursive; font-size: 30px; letter-spacing: 4px;
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.round-counter {
  font-size: 11px; color: var(--text-dim); font-weight: 700; letter-spacing: 1px;
}

/* Section divider */
.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  color: var(--text-dim); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before, .section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--surface2);
}

/* Court cards */
.courts-grid {
  display: grid; gap: 8px;
  grid-template-columns: repeat(2, 1fr);
}
.courts-grid.col1 { grid-template-columns: 1fr; }

.court-card {
  background: var(--surface); border-radius: var(--radius); overflow: hidden;
  transition: background 0.3s;
}
.court-card-header {
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  padding: 5px 12px;
  font-family: 'Bebas Neue', cursive; font-size: 13px; letter-spacing: 2px;
  color: var(--on-accent);
}
.court-card-body {
  padding: 9px 11px; display: flex; flex-direction: column; gap: 4px;
}
.court-team { display: flex; align-items: center; gap: 7px; }
.team-badge {
  font-family: 'Bebas Neue', cursive; font-size: 11px; letter-spacing: 1px;
  padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  align-self: center;
}
.team-badge.a { background: var(--accent-a); color: var(--on-accent); }
.team-badge.b { background: var(--accent-b); color: #fff; }
.team-player-boxes {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
}
.team-player-box {
  background: var(--surface2); border-radius: 7px;
  padding: 5px 8px; font-size: 12px; font-weight: 700;
  color: var(--text); text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.court-vs {
  text-align: center; margin-left: calc(6px + 6px + 6px + 14px);
  /* バッジ幅(約28px) + gap(7px) 分オフセットしてプレイヤーボックス中央に揃える */
  font-size: 9px; letter-spacing: 2px;
  color: var(--text-dim); font-weight: 700;
}

/* Rest bar */
.rest-bar {
  background: var(--surface); border-radius: 10px;
  padding: 7px 12px;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
}
.rest-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: var(--text-dim); text-transform: uppercase; flex-shrink: 0;
}
.rest-chip {
  background: var(--surface2); border-radius: 12px;
  padding: 3px 9px; font-size: 11px; font-weight: 700; color: var(--text-dim);
}

/* Next round */
.next-divider {
  position: relative; text-align: center; margin: 2px 0;
}
.next-divider::before {
  content: ''; position: absolute; top: 50%; left: 0; right: 0;
  height: 1px; background: var(--surface2);
}
.next-divider-label {
  position: relative; display: inline-block;
  background: var(--bg); padding: 0 12px;
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  color: var(--text-dim); text-transform: uppercase;
}
.next-courts { display: flex; flex-direction: column; gap: 5px; opacity: 0.72; }
.next-court-row {
  background: var(--surface); border-radius: 8px; padding: 7px 12px;
  display: flex; align-items: center; gap: 8px;
}
.next-court-label {
  font-family: 'Bebas Neue', cursive; font-size: 12px; letter-spacing: 1px;
  color: var(--accent-a); flex-shrink: 0; min-width: 40px;
}
.next-court-matchup {
  font-size: 11px; color: var(--text); font-weight: 700;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.next-rest-row {
  background: var(--surface); border-radius: 8px;
  padding: 6px 12px; opacity: 0.72;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
}

/* Nav buttons */
.game-nav {
  padding: 8px 12px env(safe-area-inset-bottom, 12px);
  display: flex; gap: 8px;
  max-width: 600px; margin: 0 auto; width: 100%;
  background: var(--bg);
  border-top: 1px solid rgba(128,128,255,0.08);
}
.nav-btn {
  flex: 1; padding: 13px 8px;
  border: none; border-radius: var(--radius);
  font-family: 'Bebas Neue', cursive; font-size: 17px; letter-spacing: 2px;
  cursor: pointer; transition: all 0.15s;
}
.nav-btn-prev { background: var(--surface2); color: var(--text-dim); }
.nav-btn-next {
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  color: var(--on-accent); flex: 2.5;
  box-shadow: 0 0 14px rgba(0,229,200,0.18);
}
.nav-btn:active { transform: scale(0.97); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ========== FOOTER ========== */
.app-footer {
  text-align: center; padding: 12px;
  font-size: 10px; color: var(--footer-color); letter-spacing: 1px;
}
</style>
</head>
<body>

<!-- TOP BAR（ゲーム画面のみ表示） -->
<div class="top-bar" id="top-bar" style="display:none">
  <div class="top-bar-round" id="top-bar-round">ROUND 1</div>
  <button class="icon-btn" id="layout-btn" title="コート縦横切替" onclick="toggleLayout()">⊞</button>
  <button class="icon-btn" id="back-btn" title="設定に戻る" onclick="goBack()">⚙️</button>
</div>

<!-- ========== SETUP SCREEN ========== -->
<div id="setup-screen">
  <div class="setup-logo">BADMINTON<br>DOUBLES MAKER</div>

  <!-- コート数 -->
  <div class="setup-card">
    <div class="setup-label">コート数</div>
    <div class="pill-row" id="court-pills">
      <button class="pill sel-a" data-val="1" onclick="selCourt(this)">1コート</button>
      <button class="pill"       data-val="2" onclick="selCourt(this)">2コート</button>
      <button class="pill"       data-val="3" onclick="selCourt(this)">3コート</button>
      <button class="pill"       data-val="4" onclick="selCourt(this)">4コート</button>
    </div>
  </div>

  <!-- 参加人数 -->
  <div class="setup-card">
    <div class="setup-label">参加人数</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div class="stepper">
        <button class="stepper-btn" onclick="adjustPlayers(-1)">−</button>
        <div class="stepper-val" id="player-count-display">10</div>
        <button class="stepper-btn" onclick="adjustPlayers(1)">+</button>
      </div>
      <span style="font-size:12px;color:var(--text-dim)" id="court-info-hint"></span>
    </div>
  </div>

  <!-- 選手名 -->
  <div class="setup-card">
    <div class="setup-label">選手名（省略可 — 番号で出力）</div>
    <div class="name-grid" id="name-grid"></div>
  </div>

  <button class="start-btn" onclick="startGame()">GAME START</button>

  <!-- 配色選択 -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:420px;">
    <button class="pill scheme-pill sel-a" data-scheme="dark"  onclick="selScheme(this)">🌊 Dark</button>
    <button class="pill scheme-pill"      data-scheme="white" onclick="selScheme(this)">☀️ White</button>
    <button class="pill scheme-pill"      data-scheme="bw"    onclick="selScheme(this)">◻ B&amp;W</button>
    <button class="pill scheme-pill"      data-scheme="neon"  onclick="selScheme(this)">⚡ Neon</button>
  </div>

  <div class="app-footer">BADMINTON DOUBLES MAKER</div>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="game-screen" style="display:none;flex-direction:column;height:calc(100dvh - 57px)">
  <div class="game-body" id="game-body"></div>
  <div class="game-nav">
    <button class="nav-btn nav-btn-prev" id="prev-btn" onclick="goRound(-1)">← 前へ</button>
    <button class="nav-btn nav-btn-next" id="next-btn" onclick="goRound(1)">次のラウンドへ →</button>
  </div>
</div>

<script>
// ============================================================
//  STATE
// ============================================================
const cfg = {
  courts: 1,
  players: 10,
  names: {},
  colorScheme: 'dark',
};
let rounds = [];
let curIdx  = 0;
let courtLayout = 'grid'; // 'grid'=横並び / 'list'=縦並び
const TOTAL_ROUNDS = 80;

// ============================================================
//  SETUP UI
// ============================================================
function selCourt(el) {
  document.querySelectorAll('#court-pills .pill').forEach(p => p.classList.remove('sel-a'));
  el.classList.add('sel-a');
  cfg.courts = parseInt(el.dataset.val);
  updateHint();
}

function adjustPlayers(d) {
  cfg.players = Math.min(25, Math.max(4, cfg.players + d));
  document.getElementById('player-count-display').textContent = cfg.players;
  updateHint();
  renderNameGrid();
}

function updateHint() {
  const eff = Math.min(cfg.courts, Math.floor(cfg.players / 4));
  const playing = eff * 4;
  const resting = cfg.players - playing;
  const hint = document.getElementById('court-info-hint');
  hint.textContent = resting > 0
    ? `出場 ${playing}人 / 休み ${resting}人`
    : `全員出場（${playing}人）`;
}

function renderNameGrid() {
  const grid = document.getElementById('name-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= cfg.players; i++) {
    const item = document.createElement('div');
    item.className = 'name-item';
    item.innerHTML = `
      <span class="name-num">${i}</span>
      <input class="name-input" type="text" placeholder="名前" maxlength="8"
        value="${cfg.names[i] || ''}"
        oninput="cfg.names[${i}] = this.value.trim()"
        data-idx="${i}">`;
    grid.appendChild(item);
  }
}

// ============================================================
//  ROUND GENERATION ALGORITHM
//  方針: lastPlayed[i] = 最後に出場したラウンド番号（小さい順＝長く休んでいる）
//        毎ラウンド昇順ソートし上位 P人を出場させる → 連続休み最小化
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateRounds(numPlayers, numCourts, total) {
  const effCourts = Math.min(numCourts, Math.floor(numPlayers / 4));
  const P = effCourts * 4;
  const numResting = numPlayers - P;

  const restCount = new Array(numPlayers).fill(0);
  let prevResting = new Set(); // 前ラウンドで休んだプレイヤー

  const result = [];

  for (let r = 1; r <= total; r++) {
    // シャッフルで同条件内はランダムにしてからソート
    const shuffled = shuffle([...Array(numPlayers).keys()]);
    shuffled.sort((a, b) => {
      // 第1キー: 累計休み回数（少ない順）
      if (restCount[a] !== restCount[b]) return restCount[a] - restCount[b];
      // 第2キー: 前回休んだ人を後回し（0=優先, 1=後回し）
      const aP = prevResting.has(a) ? 1 : 0;
      const bP = prevResting.has(b) ? 1 : 0;
      return aP - bP;
    });

    const resting = numResting > 0 ? shuffled.slice(0, numResting) : [];
    const playing = shuffled.slice(numResting);

    resting.forEach(p => { restCount[p]++; });
    prevResting = new Set(resting);

    const sp = shuffle([...playing]);
    const courts = [];
    for (let c = 0; c < effCourts; c++) {
      const cp = sp.slice(c * 4, c * 4 + 4);
      courts.push({ teamA: [cp[0], cp[1]], teamB: [cp[2], cp[3]] });
    }

    result.push({ roundNum: r, courts, resting: [...resting] });
  }
  return result;
}

// ============================================================
//  DISPLAY HELPERS
// ============================================================
// 0-based index → 表示名（名前入力があれば名前、なければ番号）
function pName(idx) {
  const num = idx + 1;
  const name = cfg.names[num];
  return name ? `${num}.${name}` : String(num);
}
function teamStr(team) { return team.map(pName).join('・'); }

// ============================================================
//  RENDER
// ============================================================
function renderGame() {
  const body = document.getElementById('game-body');
  const cur = rounds[curIdx];
  const nxt = rounds[curIdx + 1];

  // トップバーのラウンド表示を更新
  document.getElementById('top-bar-round').textContent = `ROUND ${cur.roundNum}`;

  let html = '';

  // --- 現在のラウンドラベル ---
  html += `<div class="section-title">現在のラウンド</div>`;

  // --- コートカード ---
  const useGrid = courtLayout === 'grid' && cur.courts.length > 1;
  html += `<div class="courts-grid ${useGrid ? '' : 'col1'}">`;
  cur.courts.forEach((ct, i) => {
    html += `
      <div class="court-card">
        <div class="court-card-header">COURT ${i + 1}</div>
        <div class="court-card-body">
          <div class="court-team">
            <span class="team-badge a">A</span>
            <div class="team-player-boxes">
              <span class="team-player-box">${pName(ct.teamA[0])}</span>
              <span class="team-player-box">${pName(ct.teamA[1])}</span>
            </div>
          </div>
          <div class="court-vs">VS</div>
          <div class="court-team">
            <span class="team-badge b">B</span>
            <div class="team-player-boxes">
              <span class="team-player-box">${pName(ct.teamB[0])}</span>
              <span class="team-player-box">${pName(ct.teamB[1])}</span>
            </div>
          </div>
        </div>
      </div>`;
  });
  html += '</div>';

  // --- 休み ---
  if (cur.resting.length > 0) {
    html += `<div class="rest-bar">
      <span class="rest-label">休み</span>
      ${cur.resting.map(p => `<span class="rest-chip">${pName(p)}</span>`).join('')}
    </div>`;
  }

  // --- 次のラウンドプレビュー ---
  if (nxt) {
    html += `<div class="next-divider">
      <span class="next-divider-label">NEXT — ROUND ${nxt.roundNum}</span>
    </div>
    <div class="next-courts">`;
    nxt.courts.forEach((ct, i) => {
      html += `<div class="next-court-row">
        <span class="next-court-label">CT ${i + 1}</span>
        <span class="next-court-matchup">
          ${teamStr(ct.teamA)}
          <span style="color:var(--text-dim);font-weight:400"> vs </span>
          ${teamStr(ct.teamB)}
        </span>
      </div>`;
    });
    if (nxt.resting.length > 0) {
      html += `<div class="next-rest-row">
        <span class="rest-label">休み</span>
        ${nxt.resting.map(p => `<span class="rest-chip">${pName(p)}</span>`).join('')}
      </div>`;
    }
    html += '</div>';
  } else {
    html += `<div class="next-divider">
      <span class="next-divider-label">— 最終ラウンド —</span>
    </div>`;
  }

  body.innerHTML = html;
  body.scrollTop = 0;

  // ボタン制御
  document.getElementById('prev-btn').disabled = curIdx === 0;
  document.getElementById('next-btn').disabled = curIdx >= rounds.length - 2;
}

function goRound(d) {
  curIdx = Math.max(0, Math.min(rounds.length - 2, curIdx + d));
  renderGame();
}

// ============================================================
//  GAME START / NAVIGATION
// ============================================================
function startGame() {
  document.querySelectorAll('.name-input').forEach(inp => {
    cfg.names[parseInt(inp.dataset.idx)] = inp.value.trim();
  });

  rounds = generateRounds(cfg.players, cfg.courts, TOTAL_ROUNDS);
  curIdx = 0;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  document.getElementById('top-bar').style.display      = 'flex';

  renderGame();
}

function goBack() {
  document.getElementById('game-screen').style.display  = 'none';
  document.getElementById('top-bar').style.display      = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

// ============================================================
//  LAYOUT TOGGLE
// ============================================================
function toggleLayout() {
  courtLayout = courtLayout === 'grid' ? 'list' : 'grid';
  document.getElementById('layout-btn').textContent = courtLayout === 'grid' ? '⊞' : '☰';
  renderGame();
}

// ============================================================
//  COLOR SCHEME
// ============================================================
function selScheme(el) {
  document.querySelectorAll('.scheme-pill').forEach(p => p.classList.remove('sel-a'));
  el.classList.add('sel-a');
  cfg.colorScheme = el.dataset.scheme;
  document.documentElement.setAttribute('data-scheme', cfg.colorScheme);
}

// ============================================================
//  INIT
// ============================================================
renderNameGrid();
updateHint();
</script>
</body>
</html>
